<div class="posts-grid">
  <div class="posts-container-wrapper">
    <h2 class="fade-in">Blog Posts</h2>

    <div class="controls slide-in">
      <input
        type="text"
        class="search-bar"
        placeholder="🔍 Search posts..."
        (input)="onSearch($event)"
      />
      <select class="filter-select" (change)="onFilter($event)">
        <option value="">All Categories</option>
        <option value="Tech">Tech</option>
        <option value="Lifestyle">Lifestyle</option>
      </select>
      <select class="sort-select" (change)="onSort($event)">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
      <a
        routerLink="/create-post"
        class="create-button"
        [class.disabled]="!authService.isAuthenticated()"
        (click)="!authService.isAuthenticated() && promptLogin()"
      >
        Create New Post <i class="fa-solid fa-circle-plus"></i>
      </a>
      <button
        class="login-button"
        *ngIf="!authService.isAuthenticated()"
        routerLink="/login"
      >
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
      </button>
      <button
        class="logout-button"
        *ngIf="authService.isAuthenticated()"
        (click)="logout()"
      >
        Logout <i class="fa-solid fa-arrow-right-from-bracket"></i>
      </button>
    </div>

    <div class="posts-container">
      <div
        *ngFor="let post of filteredPosts; let i = index"
        class="post-item slide-up"
        [style.animation-delay]="i * 0.1 + 's'"
      >
        <img
          [src]="
            post.imageUrl ||
            'https://via.placeholder.com/400x250/667eea/ffffff?text=Blog+Post'
          "
          alt="{{ post.title }}"
          class="post-image"
          (error)="handleImageError($event, post.id)"
        />
        <div class="post-content">
          <h3>{{ post.title }}</h3>
          <p>
            {{ post.body | slice : 0 : 150
            }}{{ post.body.length > 150 ? "..." : "" }}
          </p>
          <a [routerLink]="['/post', post.id]" class="read-more">Read More</a>
        </div>
      </div>
    </div>

    <app-pagination
      *ngIf="totalPages > 1"
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="onPageChange($event)"
      class="pagination fade-in"
    ></app-pagination>
  </div>

  <button class="clear-cache-btn" (click)="clearCache()" title="Clear Cache">
    <img
      width="50"
      height="50"
      src="https://img.icons8.com/ios-filled/50/broom.png"
      alt="broom"
    />
  </button>

  <div
    class="cache-message"
    *ngIf="showMessage"
    [@fadeAnimation]="showMessage ? 'visible' : 'hidden'"
  >
    ✅ Cache cleared successfully!
  </div>
</div>

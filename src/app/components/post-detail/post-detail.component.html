<div class="post-detail">
  <button class="back-btn" (click)="goBack()" title="Go Back">
    <svg
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <h2>{{ post.title }}</h2>
  <p>{{ post.body }}</p>
  <img
    *ngIf="post.imageUrl"
    [src]="post.imageUrl"
    alt="{{ post.title }}"
    class="post-image"
  />

  <h3>Comments</h3>
  <ul>
    <li *ngFor="let comment of comments">
      {{ comment.body }}
    </li>
  </ul>

  <div class="button-group">
    <button
      class="edit-btn"
      (click)="openEditModal()"
      [disabled]="!authService.isAuthenticated()"
    >
      Edit Post
    </button>
    <button
      class="delete-btn"
      (click)="deletePost()"
      [disabled]="!authService.isAuthenticated()"
    >
      Delete Post
    </button>
    <button
      class="login-button"
      *ngIf="!authService.isAuthenticated()"
      routerLink="/login"
    >
      Login
    </button>
  </div>
</div>

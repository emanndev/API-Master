<div class="post-detail" [class.loading]="!post">
  <div *ngIf="!post" class="post-content">
    <div class="spinner"></div>
  </div>

  <ng-container *ngIf="post">
    <div class="post-header">
      <button class="back-btn" (click)="goBack()" title="Go Back">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>

      <h2>{{ post.title }}</h2>
    </div>

    <div class="post-content">
      <p class="post-body">{{ post.body }}</p>

      <img
        *ngIf="post.imageUrl"
        [src]="post.imageUrl"
        [alt]="post.title"
        class="post-image"
        (error)="handleImageError($event)"
      />
    </div>

    <div class="comments-section">
      <h3>Comments</h3>

      <ul
        class="comments-list"
        *ngIf="comments && comments.length > 0; else noComments"
      >
        <li
          class="comment-item"
          *ngFor="let comment of comments; trackBy: trackByCommentId"
        >
          {{ comment.body }}
        </li>
      </ul>

      <ng-template #noComments>
        <div class="no-comments">
          No comments yet. Be the first to share your thoughts!
        </div>
      </ng-template>
    </div>

    <div class="button-group">
      <button
        class="btn edit-btn"
        (click)="openEdit()"
        [disabled]="!authService.isAuthenticated()"
        title="Edit this post"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
          ></path>
          <path
            d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
          ></path>
        </svg>
        Edit Post
      </button>

      <button
        class="btn delete-btn"
        (click)="deletePost()"
        [disabled]="!authService.isAuthenticated()"
        title="Delete this post"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="3 6 5 6 21 6"></polyline>
          <path
            d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          ></path>
        </svg>
        Delete Post
      </button>

      <button
        class="btn login-button"
        *ngIf="!authService.isAuthenticated()"
        routerLink="/login"
        title="Login to edit or delete posts"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
          <polyline points="10 17 15 12 10 7"></polyline>
          <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        Login
      </button>
    </div>
  </ng-container>
</div>
